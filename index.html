<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js"></script>
        <title>Nobel Gasses Science Project</title>
    </head>
    <body>
        <h1 >Nobel Gasses Science Project</h1>
        <p class="mini-title" >Are you ready to learn?</p>
        
        <div class="parent1">
            <div>
                <label>Which group are the nobel gasses? </label>
                <input type="number" id="q1" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(1);}else{}"/>
                <p id="q1Result"></p>
            </div>
            
            <div>
                <label>How many are there</label>
                <input type="number" id="q2" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(2);}else{}"/>
                <p id="q2Result"></p>
            </div>
        </div>

        <p class="teaching" id="teaching1">Because they have eight valence electrons, what is their common ion? Discuss.</p>
        <p class="teaching" id="teaching2">True or False Time :)</p>

        <div class="parent2" id = group2>
                    
            <div>
                <label>They all taste like cotton candy.</label>
                <input type="text" id="q3" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(3);}else{}"/>
                <p id="q3Result"></p>
            </div>
            
            <div>
                <label>They are colorless.</label>
                <input type="text" id="q4" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(4);}else{}"/>
                <p id="q4Result"></p>
            </div>

            <div>
                <label>They have a distinct smell.</label>
                <input type="text" id="q5" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(5);}else{}"/>
                <p id="q5Result"></p>
            </div>
            
            <div>
                <label>The boiling points are VERY high.</label>
                <input type="text" id="q6" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(6);}else{}"/>
                <p id="q6Result"></p>
            </div>

            <div>
                <label>They are hard to melt.</label>
                <input type="text" id="q7" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(7);}else{}"/>
                <p id="q7Result"></p>
            </div>
            
            <div>
                <label>They aren't very reactive.</label>
                <input type="text" id="q8" placeholder="Type response here" onkeydown="if (event.key == 'Enter'){checkAccuracy(8);}else{}"/>
                <p id="q8Result"></p>
            </div>

        </div>
        
        <div class="parent" id="group3">

            <div>
                <label>Why aren't nobel gasses very reactive? </label>
                <textarea class = text-input-short type="text" id="q9" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(9, true)">Submit</button>
                <p id="q9Result"></p>
            </div>
            
            <div >
                <label>Name one of the two debated "most reactive" nobel gas.</label>
                <textarea class = text-input-short type="text" id="q10" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(10, true)">Submit</button>
                <p id="q10Result"></p>
            </div>
            <label for="xenon">This is xenon</label>
            <img id="xenon" src="xenon.jpg">
        </div>

        <p class="teaching" id="teaching3">Which element(s) do you think are least reactive? Please discuss</p>

        <div class="parent" id="group4">

            <div>
                <label>What is the pattern in reactivity? </label>
                <textarea class = text-input-short type="text" id="q11" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(11, true)">Submit</button>
                <p id="q11Result"></p>
            </div>
            
            <div >
                <label>Guess the fun fact (good luck)</label>
                <textarea class = text-input-short type="text" id="q12" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(12)">Submit</button>
                <p id="q12Result"></p>
            </div>
        </div>



        <div class="parent" id="group5">

            <div>
                <label>What is helium used for?</label>
                <textarea class = text-input-short type="text" id="q13" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(13, true)">Submit</button>
                <p id="q13Result"></p>
            </div>
            
            <div >
                <label>What is neon used for?</label>
                <textarea class = text-input-short type="text" id="q14" placeholder="Type response here"></textarea>
                <button onclick="checkAccuracy(14, true)">Submit</button>
                <p id="q14Result"></p>
            </div>
            <label for="neon">This is xenon</label>
            <img id="neon" src="neon.jpg">
        </div>
    </body>
</html>
